# =============================================================================
# CrewAI Enterprise Control Center — Development Stack
# Governance: Section 3 — Container Strategy
# =============================================================================

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crewai
      POSTGRES_PASSWORD: crewai
      POSTGRES_DB: crewai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../packages:/app/packages
    command: uvicorn apps.api.src.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    env_file: ../../.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/worker:/app/apps/worker
      - ../../packages:/app/packages
    command: celery -A apps.worker.src.celery_app worker --loglevel=info --concurrency=1

volumes:
  postgres_data:
  redis_data: